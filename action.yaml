---
name: "qualify-build-action"
description: "Analyses the job and makes decisions about what kind of build to run."
inputs:
  feature_branch_version_regex:
    description: "Regex to match feature branch versions."
    required: false
    default: ^[0-9]+(\.[0-9]+){2}(-[[:alnum:]]+){2}(-.+)?$
  workflow_name:
    description: "Name of a workflow that protected branches are to be validated against."
    required: false
    default: context:validate-release
outputs:
  kind:
    description: "Build kind to run: publish when the action should produce a published artifact, otherwise test."
    value: ${{ steps.define-build.outputs.kind }}
  tag:
    description: "Tag to publish. Set for publish builds; omitted for test builds."
    value: ${{ steps.define-build.outputs.tag }}
  target:
    description: "Target of the build: feature or release."
    value: ${{ steps.define-target.outputs.target }}
  trigger:
    description: "Build trigger classification: push_to_feature_branch, push_to_release_branch, pull_request_to_release_branch, or pull_request_to_feature_branch."
    value: ${{ steps.qualify-build.outputs.trigger }}
  version:
    description: "Version to publish. Set for publish builds; omitted for test builds."
    value: ${{ steps.define-build.outputs.version }}
runs:
  using: "composite"
  steps:
    - id: define-target
      name: "Is a release or a feature version needed?"
      shell: bash
      env:
        GH_TOKEN: ${{ env.GH_TOKEN || github.token }}
      run: |
        [ "${{ runner.debug }}" == 1 ] && set -xv
        set -u
        
        if
            gh ruleset check --repo "${{ github.repository }}" "${{ github.base_ref || github.ref_name }}" \
              | grep -q '${{ inputs.workflow_name}}' ;
        then
            target=release
        else
            target=feature
        fi
        echo "::notice::target is ${target}"
        echo "target=${target}" >>"${GITHUB_OUTPUT}"
    - id: qualify-build
      name: "Qualify build type"
      shell: bash
      run: |
        [ "${{ runner.debug }}" == 1 ] && set -xv
        set -u
        
        case "${{ github.event_name }}" in
        pull_request|push)
          trigger=${{ github.event_name }}_to_${{ steps.define-target.outputs.target }}_branch
          ;;
        *)
          echo "::error::Unsupported event: ${{ github.event_name }}"
          exit 1
          ;;
        esac
        
        echo "::notice::trigger is ${trigger}"
        echo "trigger=${trigger}" >>"${GITHUB_OUTPUT}"
    - id: clq-extract
      name: "Extract tag from the changelog"
      uses: denisa/clq-action@v1
      with:
        changeMap: .github/clq/changemap.json
        mode: ${{ steps.define-target.outputs.target }}
    - id: define-build
      name: "Is this a test or publish build"
      shell: bash
      run: |
        [ "${{ runner.debug }}" == 1 ] && set -xv
        set -u
        
        function is_feature_branch_version() {
          # major.minor.patch-user-issue
          # user and issue relaxed to be any alphanumeric sequence 
          if [[ "${{ steps.clq-extract.outputs.version }}" =~ ${{ inputs.feature_branch_version_regex }} ]]; then
            return 0
          fi
          return 1
        }
        
        function is_publishable_feature_branch() {
          if ( [ "${{ github.event_name }}" == "push" ] && is_feature_branch_version ); then
            return 0
          fi
          return 1
        }
        
        if [ "${{ steps.define-target.outputs.target }}" == "release" ] \
            && [ "${{ steps.clq-extract.outputs.status }}" != "released" ]; then
          echo "::error::${{ steps.clq-extract.outputs.version }} is not a valid version for a release branch"
          {
            echo "# Version Validation Error"
            echo "Release branches, or a pull request targeting them, must have a release version."
            echo "${{ steps.clq-extract.outputs.version }} is not valid for release branches"
          } >>"${GITHUB_STEP_SUMMARY}"
          exit 1
        fi
        
        if [ "${{ steps.qualify-build.outputs.trigger }}" == "push_to_release_branch" ]; then
          kind=publish
          version="${{ steps.clq-extract.outputs.version }}"
        elif is_publishable_feature_branch; then
          kind=publish
          version="${{ steps.clq-extract.outputs.version }}-${{ github.run_id }}.${{ github.run_number }}.${{ github.run_attempt }}"
        else
          kind=test
        fi
        echo "::notice::kind is ${kind}"
        echo "kind=${kind}" >>"${GITHUB_OUTPUT}"
        echo "::notice::version is ${version:-undefined}"
        if [ -v version ]; then
          echo "version=${version}" >>"${GITHUB_OUTPUT}";
          echo "tag=v${version}" >>"${GITHUB_OUTPUT}";
        fi
